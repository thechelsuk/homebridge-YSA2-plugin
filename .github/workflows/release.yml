name: Release and Publish to NPM

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - run: npm install
      - run: npm run build

  Release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Get Version, Description, and Commit Message
        id: get_data
        run: |
          echo "version=v$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT
          echo 'description<<EOF\n%s\nEOF\n' "$(node -p 'require("./package.json").description')" >> $GITHUB_OUTPUT
          echo 'message<<EOF\n%s\nEOF\n' "$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT'

      - name: Check if Tag Exists
        id: check_tag
        run: |
          if git rev-parse ${{ steps.get_data.outputs.version }} >/dev/null 2>&1; then
            echo "Tag exists"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist"
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and Push Tag
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@.github.com"
          git tag ${{ steps.get_data.outputs.version }}
          git push origin ${{ steps.get_data.outputs.version }}

      - name: Create GitHub Release
        id: create_release
        if: steps.check_tag.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_data.outputs.version }}
          name: ${{ steps.get_data.outputs.version }}
          make_latest: true
          body: |
            ## About

            ${{ steps.get_data.outputs.description }}

            ## Recent Changes

            ${{ steps.get_data.outputs.message }}
          draft: false
          prerelease: ${{ contains(steps.get_data.outputs.version, '-') }}

  Publish:
    runs-on: ubuntu-latest
    needs: Release
    steps:
      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
