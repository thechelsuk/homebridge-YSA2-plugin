name: CICD Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      - run: npm ci
      - run: npm run build

      - name: Get Version, Description, and Commit Message
        id: get_data
        run: |
          echo "version=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

          {
            echo "description<<EOF"
            node -p 'require("./package.json").description'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "message<<EOF"
            git log -1 --pretty=%B | grep -v '^Signed-off-by:' || true
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check if Tag Exists
        id: check_tag
        run: |
          if git rev-parse ${{ steps.get_data.outputs.version }} >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and Push Tag
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.get_data.outputs.version }}
          git push origin ${{ steps.get_data.outputs.version }}

      - name: Pack tarball
        if: steps.check_tag.outputs.tag_exists == 'false'
        id: pack
        run: echo "tarball=$(npm pack --silent --ignore-scripts)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_data.outputs.version }}
          name: ${{ steps.get_data.outputs.version }}
          make_latest: true
          files: ${{ steps.pack.outputs.tarball }}
          body: |
            ## About

            ${{ steps.get_data.outputs.description }}

            ## Recent Changes

            ${{ steps.get_data.outputs.message }}
          draft: false
          prerelease: ${{ contains(steps.get_data.outputs.version, '-') }}

      - name: Publish to NPM
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}