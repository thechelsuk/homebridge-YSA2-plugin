name: Release and Publish to NPM

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  tag-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - run: npm install
      - run: npm run build

      - id: get_version
        run: |
          echo "version=v$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - id: check_tag
        run: |
          if git rev-parse ${{ steps.get_version.outputs.version }} >/dev/null 2>&1; then
            echo "Tag exists"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist"
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and Push Tag
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@.github.com"
          git tag ${{ steps.get_version.outputs.version }}
          git push origin ${{ steps.get_version.outputs.version }}

      - name: Create GitHub Release
        if: |
          steps.version_changed.outputs.changed == 'true' &&
          steps.tag_check.outputs.exists == 'false'
          uses: softprops/action-gh-release@v3
          with:
            tag_name: ${{ steps.get_version.outputs.version }}
            name: ${{ steps.get_version.outputs.version }}
            make_latest: true
            body: |
              ## About

              ${{ steps.pkg.outputs.description }}

              ## Recent Changes

              ${{ steps.commit.outputs.message }}
            draft: false
            prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}

      - name: Publish to NPM
        needs: Create GitHub Release
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
